        tl.fromTo(

          zoomInner,
          { y: -282, duration: 0.72, ease: "power3.inOut" },

          { opacity: 0, scaleX: 0 },
          { opacity: 0.9, scaleX: 1, duration: 0.64, ease: "power2.out" },
