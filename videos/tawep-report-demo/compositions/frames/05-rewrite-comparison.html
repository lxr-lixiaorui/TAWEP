        }

          left: 36.7188cqw;
          background: rgba(116, 190, 242, 0.36);

        [id="frame-05-rewrite-comparison-focus-line"] {
          position: absolute;

        [id="frame-05-rewrite-comparison-focus-line-fill"] {
          display: block;
          width: 100%;

          background: #006d6f;
          transform-origin: 0 50%;
          will-change: transform;
        }
      </style>

      <div data-hf-id="hf-6qaf" id="root" data-composition-id="05-rewrite-comparison" data-width="1920" data-height="1080" data-duration="3.5">
        <div data-hf-id="hf-pqvc" id="frame-05-rewrite-comparison-ground" class="clip" data-start="0" data-duration="3.5" data-track-index="0"></div>

        <div data-hf-id="hf-w3l8" id="frame-05-rewrite-comparison-scene" class="clip" data-start="0" data-duration="3.5" data-track-index="1">
          <div data-hf-id="hf-8jlp" id="frame-05-rewrite-comparison-surface">
            <img data-hf-id="hf-n3sp" data-layout-allow-overflow id="frame-05-rewrite-comparison-image" src="capture/assets/rewrite.png" alt="" draggable="false">

            <span data-hf-id="hf-ip29" data-05-rewrite-focus="logic"></span>
            <span data-hf-id="hf-nes7" data-05-rewrite-focus="reasoning"></span>
            <span data-hf-id="hf-p8l3" data-05-rewrite-focus="removed"></span>
            <span data-hf-id="hf-voqz" data-05-rewrite-focus="expression"></span>

            <span data-hf-id="hf-9j3g" data-05-rewrite-legend="logic"></span>
            <span data-hf-id="hf-iuiy" data-05-rewrite-legend="reasoning"></span>
            <span data-hf-id="hf-69ly" data-05-rewrite-legend="removed"></span>
            <span data-hf-id="hf-fczw" data-05-rewrite-legend="expression"></span>

            <div data-hf-id="hf-korw" id="frame-05-rewrite-comparison-lower-veil"></div>
          </div>

          <div data-hf-id="hf-wjcb" id="frame-05-rewrite-comparison-focus-line">
            <span data-hf-id="hf-vxde" id="frame-05-rewrite-comparison-focus-line-fill"></span>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};

        const timeline = gsap.timeline({ paused: true });
        const surface = document.getElementById("frame-05-rewrite-comparison-surface");
        const veil = document.getElementById("frame-05-rewrite-comparison-lower-veil");
        const progress = document.getElementById("frame-05-rewrite-comparison-focus-line-fill");

        timeline.fromTo(
          surface,
          { opacity: 0, y: 14, scale: 0.988 },
          { opacity: 1, y: 0, scale: 1, duration: 0.62, ease: "power3.out" },
          0,
        );
        timeline.fromTo(
          progress,
          { scaleX: 0 },
          { scaleX: 1, duration: 3.18, ease: "none" },
          0,
        );
        timeline.fromTo(
          veil,
          { opacity: 1 },
          { opacity: 0, duration: 0.45, ease: "power2.out" },
          0.45,
        );

        const focusBeats = [
          { focus: document.querySelector('[data-05-rewrite-focus="logic"]'), legend: document.querySelector('[data-05-rewrite-legend="logic"]'), start: 0.9 },
          { focus: document.querySelector('[data-05-rewrite-focus="reasoning"]'), legend: document.querySelector('[data-05-rewrite-legend="reasoning"]'), start: 1.22 },
          { focus: document.querySelector('[data-05-rewrite-focus="removed"]'), legend: document.querySelector('[data-05-rewrite-legend="removed"]'), start: 1.54 },
          { focus: document.querySelector('[data-05-rewrite-focus="expression"]'), legend: document.querySelector('[data-05-rewrite-legend="expression"]'), start: 1.86 },
        ];

        focusBeats.forEach(({ focus, legend, start }) => {
          timeline.fromTo(
            focus,
            { opacity: 0, scaleX: 0 },
            { opacity: 0.82, scaleX: 1, duration: 0.18, ease: "power2.out" },
            start,
          );
          timeline.to(
            focus,
            { opacity: 0, duration: 0.16, ease: "power1.out" },
            start + 0.18,
          );
          timeline.fromTo(
            legend,
            { opacity: 0, scale: 0.82 },
            { opacity: 0.9, scale: 1.12, duration: 0.14, ease: "power2.out" },
            start,
          );
          timeline.to(
            legend,
            { opacity: 0, scale: 1, duration: 0.2, ease: "power1.out" },
            start + 0.14,
          );
        });

        timeline.to(
          surface,
          { opacity: 0.12, scale: 0.994, duration: 0.32, ease: "power2.inOut" },
          3.18,
        );
        timeline.to(
          "#frame-05-rewrite-comparison-focus-line",
          { opacity: 0, duration: 0.25, ease: "power1.in" },
          3.2,
        );

        window.__timelines["05-rewrite-comparison"] = timeline;
      </script>
